run:
  linters:
    enable:
      - gofmt
      - govet
      - errcheck
      - staticcheck
      - unused
      - gosimple
      - ineffassign
      - misspell
  linters-settings:
    errcheck:
      check-type-assertions: true
  issues:
    exclude-rules:
      - path: _test\.go
        linters:
          - errcheck
